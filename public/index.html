<body>

  <div id="app">
    <vapp></vapp>
  </div>

  <script src="./main.js"></script>

  <div id="first-page-flower-container" style="position: fixed; top: 72%; left: 50%; transform: translate(-50%, -50%); z-index: 9999; text-align: center; pointer-events: none; transition: opacity 0.5s ease-out;">
    <img src="./assets/img/flower.png" alt="Bouquet" style="max-width: 75%; height: auto; max-height: 40vh;" />
  </div>

  <div id="photos-container"></div>
  <style>
    #photos-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9999;
      overflow: hidden;
    }
    .floating-photo {
      position: absolute;
      max-width: 220px;
      max-height: 280px;
      width: auto;
      height: auto;
      border: 8px solid white;
      border-bottom: 24px solid white;
      box-shadow: 0 15px 35px rgba(0,0,0,0.4);
      border-radius: 2px;
      opacity: 0;
      transform: translate(-50%, -50%) translateY(40px) scale(0.8) rotate(0deg);
      transition: opacity 1.2s ease-out, transform 1.5s cubic-bezier(0.25, 1, 0.5, 1);
    }
    @media (max-width: 768px) {
      .floating-photo {
        max-width: 140px;
        max-height: 180px;
        border-width: 5px;
        border-bottom-width: 16px;
      }
    }
    .floating-photo.show {
      opacity: 1;
    }
    .floating-photo.hide {
      opacity: 0;
      transform: translate(-50%, -50%) translateY(-40px) scale(0.8);
      transition: opacity 1.2s ease-in, transform 1.5s ease-in;
    }
    
    .heart-bubble {
      position: fixed;
      bottom: -50px;
      width: 20px;
      height: 20px;
      background-color: #8B0000; /* dark red */
      transform: rotate(-45deg);
      animation: floatUp 4s ease-in forwards;
      z-index: 10000;
      opacity: 0.8;
      pointer-events: none;
      --scale: 1;
    }
    .heart-bubble::before,
    .heart-bubble::after {
      content: "";
      position: absolute;
      width: 20px;
      height: 20px;
      background-color: #8B0000;
      border-radius: 50%;
    }
    .heart-bubble::before {
      top: -10px;
      left: 0;
    }
    .heart-bubble::after {
      top: 0;
      left: 10px;
    }
    @keyframes floatUp {
      0% {
        transform: translateY(0) scale(var(--scale)) rotate(-45deg);
        opacity: 0;
      }
      10% {
        opacity: 0.8;
      }
      90% {
        opacity: 0.8;
      }
      100% {
        transform: translateY(-120vh) scale(var(--scale)) rotate(-45deg);
        opacity: 0;
      }
    }
  </style>

  <script>
    // Custom logic to show floating photos
    let currentPhotoIndex = 1;
    let seqIndex = 0;
    const sequence = [
      { left: '25%', top: '30%' },
      { left: '75%', top: '65%' },
      { left: '25%', top: '65%' },
      { left: '75%', top: '30%' },
      { left: '50%', top: '20%' },
      { left: '50%', top: '80%' }
    ];
    
    function showFloatingPhoto() {
      const container = document.getElementById('photos-container');
      
      // Limit number of photos on screen to avoid clutter
      if (container.children.length >= 3) {
        container.removeChild(container.firstChild);
      }

      const photo = document.createElement('img');
      photo.src = './assets/photos/photo_' + currentPhotoIndex + '.jpg';
      photo.className = 'floating-photo';
      
      // Sequence positions
      const pos = sequence[seqIndex % sequence.length];
      seqIndex++;

      const rotation = -15 + Math.random() * 30; // -15 to +15 deg
      
      photo.style.left = pos.left;
      photo.style.top = pos.top;
      photo.style.transform = `translate(-50%, -50%) translateY(40px) scale(0.8) rotate(${rotation}deg)`;
      
      container.appendChild(photo);
      
      // Trigger animation
      setTimeout(() => {
        photo.style.transform = `translate(-50%, -50%) translateY(0) scale(1) rotate(${rotation}deg)`;
        photo.classList.add('show');
        
        // FAKE A MOUSE DRAG TO SPAWN PROCEDURAL FLOWERS NEXT TO THE PHOTO!
        let startX = (parseFloat(pos.left) / 100) * window.innerWidth + 40;
        let startY = (parseFloat(pos.top) / 100) * window.innerHeight + 40;
        
        // Keep within bounds
        startX = Math.min(startX, window.innerWidth - 100);
        startY = Math.min(startY, window.innerHeight - 100);
        
        let endX = startX + 100;
        let endY = startY - 100;
        
        // The makemepulse engine listens on 'window' for pointer/mouse events.
        const eventConfig = { bubbles: true, cancelable: true, clientX: startX, clientY: startY, buttons: 1, which: 1 };
        window.dispatchEvent(new MouseEvent('mousedown', eventConfig));
        
        setTimeout(() => {
          eventConfig.clientX = startX + 20;
          eventConfig.clientY = startY - 20;
          window.dispatchEvent(new MouseEvent('mousemove', eventConfig));
          
          setTimeout(() => {
            eventConfig.clientX = endX;
            eventConfig.clientY = endY;
            window.dispatchEvent(new MouseEvent('mousemove', eventConfig));
            
            setTimeout(() => {
              window.dispatchEvent(new MouseEvent('mouseup', { bubbles: true, cancelable: true, clientX: endX, clientY: endY, buttons: 0, which: 0 }));
            }, 100);
          }, 100);
        }, 50);

      }, 50);
      
      // Remove after 5 seconds
      setTimeout(() => {
        photo.classList.remove('show');
        photo.classList.add('hide');
        photo.style.transform = `translate(-50%, -50%) translateY(-40px) scale(0.8) rotate(${rotation}deg)`;
        setTimeout(() => {
          if (container.contains(photo)) {
            container.removeChild(photo);
          }
        }, 1500);
      }, 5000);
      
      currentPhotoIndex++;
      if (currentPhotoIndex > 13) {
        currentPhotoIndex = 1; // loop through the 13 photos
      }
    }

    // Check periodically for GLXP to be ready
    const checkGLXP = setInterval(() => {
      if (window.GLXP && window.GLXP.audio && window.GLXP.audio.onSubtitles) {
        clearInterval(checkGLXP);
        let lastText = "";
        let heartsStarted = false;
        
        // Start floating dark red hearts on the sides for the start page
        let sideHeartsInterval = setInterval(() => {
          for (let i = 0; i < 2; i++) {
            const heart = document.createElement('div');
            heart.className = 'heart-bubble side-heart';
            // One on the left (5-20vw), one on the right (80-95vw)
            heart.style.left = (i === 0 ? Math.random() * 15 + 5 : Math.random() * 15 + 80) + 'vw';
            heart.style.animationDuration = (Math.random() * 4 + 4) + 's';
            heart.style.setProperty('--scale', Math.random() * 1.5 + 0.8);
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 8000);
          }
        }, 600);

        // Hide flower and side hearts immediately upon any interaction (which starts the experience)
        const hideFlower = () => {
          clearInterval(sideHeartsInterval);
          document.querySelectorAll('.side-heart').forEach(h => {
            h.style.transition = "opacity 1s";
            h.style.opacity = "0";
            setTimeout(() => h.remove(), 1000);
          });
          
          const flowerContainer = document.getElementById('first-page-flower-container');
          if (flowerContainer && flowerContainer.style.opacity !== "0") {
            flowerContainer.style.opacity = "0";
            setTimeout(() => { if(flowerContainer) flowerContainer.remove(); }, 500);
          }
        };
        window.addEventListener('mousedown', hideFlower, {once: true});
        window.addEventListener('touchstart', hideFlower, {once: true});
        
        window.GLXP.audio.onSubtitles.on((data) => {
          if (data.text && data.text !== lastText) {
            lastText = data.text;
            // Trigger photo animation when a new subtitle appears
            showFloatingPhoto();
            
            // Hide the flower on the first page once the experience starts
            const flowerContainer = document.getElementById('first-page-flower-container');
            if (flowerContainer && flowerContainer.style.opacity !== "0") {
              flowerContainer.style.opacity = "0";
              setTimeout(() => { if(flowerContainer) flowerContainer.remove(); }, 1000);
            }
            
            // Start dark red heart bubbles on the last page when specific text appears
            if (!heartsStarted && (data.text.includes("Happy Birthday") || data.text.includes("Thank you for being you"))) {
              heartsStarted = true;
              setInterval(() => {
                for (let i = 0; i < 3; i++) {
                  const heart = document.createElement('div');
                  heart.className = 'heart-bubble';
                  heart.style.left = (Math.random() * 90 + 5) + 'vw';
                  heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
                  heart.style.setProperty('--scale', Math.random() * 0.8 + 0.4);
                  document.body.appendChild(heart);
                  setTimeout(() => heart.remove(), 6000);
                }
              }, 200);
            }
          } else if (!data.text) {
            lastText = "";
          }
        });
      }
    }, 500);
  </script>
